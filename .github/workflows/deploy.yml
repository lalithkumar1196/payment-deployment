name: CD Pipeline

on:
  push:
    paths:
      - 'envs/**'
    branches:
      - main

  workflow_dispatch:
    inputs:
      ECRURL:
        description: "ECR Registry URL (with / at end)"
        required: true
        default: "081654307023.dkr.ecr.ap-south-1.amazonaws.com/"
      REPO:
        description: "Repository Name"
        required: true
        default: "wezvatechpayment"
      IMAGE:
        description: "Image Tag"
        required: true
        default: "rel6"
      TEST:
        description: "Environment"
        required: true
        type: choice
        options:
          - functional
          - integration
          - regression
          - uat
          - release

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout Deployment Repo
      # -----------------------------
      - name: Checkout Deployment Repo
        uses: actions/checkout@v4
        with:
          repository: lalithkumar1196/payment-deployment
          ref: main
          token: ${{ secrets.GH_PAT }}

      # Debug Inputs
      - name: Debug Inputs
        run: |
          echo "TEST='${{ inputs.TEST }}'"
          echo "IMAGE='${{ inputs.IMAGE }}'"
          echo "REPO='${{ inputs.REPO }}'"
          echo "ECRURL='${{ inputs.ECRURL }}'"

      # Debug Repository Structure
      - name: Debug Repository Structure
        run: |
          pwd
          ls -la
          echo "----- envs -----"
          ls -la envs
          echo "----- values files -----"
          find envs -name values.yaml
      # -----------------------------
      # Update values.yaml
      # -----------------------------
      - name: Update Helm values
        run: |
          cd envs/${{ inputs.TEST }}

          echo "Updating image repository..."
          sed -i "s|repository:.*|repository: ${{ inputs.ECRURL }}${{ inputs.REPO }}|g" values.yaml

          echo "Updating image tag..."
          sed -i "s|tag:.*|tag: ${{ inputs.IMAGE }}|g" values.yaml

          echo "Updated values.yaml:"
          cat values.yaml

      # -----------------------------
      # Commit & Push Changes
      # -----------------------------
      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "New deployment for Build ${{ inputs.IMAGE }}" || echo "No changes to commit"

          git push origin main
