name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      ECRURL:
        description: "ECR Registry URL (with / at end)"
        required: true
        default: "081654307023.dkr.ecr.ap-south-1.amazonaws.com/"

      REPO:
        description: "Repository Name"
        required: true
        default: "wezvatechpayment"

      IMAGE:
        description: "Image Tag"
        required: true
        default: "rel1"

      TEST:
        description: "Environment"
        required: true
        type: choice
        options:
          - integration
          - regression
          - uat
          - release

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Deployment Repo
        uses: actions/checkout@v4
        with:
          repository: lalithkumar1196/payment-deployment
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Show Inputs
        run: |
          echo "TEST=${{ inputs.TEST }}"
          echo "IMAGE=${{ inputs.IMAGE }}"
          echo "REPO=${{ inputs.REPO }}"
          echo "ECRURL=${{ inputs.ECRURL }}"

      - name: Update Helm Values
        run: |
          cd envs/${{ inputs.TEST }}

          echo "Updating image repository..."
          sed -i "s|repository:.*|repository: ${{ inputs.ECRURL }}${{ inputs.REPO }}|g" values.yaml

          echo "Updating image tag..."
          sed -i "s|tag:.*|tag: ${{ inputs.IMAGE }}|g" values.yaml

          echo "Updated values.yaml:"
          cat values.yaml

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Deploy ${{ inputs.TEST }} with image ${{ inputs.IMAGE }}" || echo "No changes to commit"

          git push origin main
